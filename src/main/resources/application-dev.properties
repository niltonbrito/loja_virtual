spring.application.name=loja_virtual

# Banco de Dados e JPA
spring.datasource.url=jdbc:postgresql://localhost:5433/loja_virtual_dev?autoreconnect=true
spring.datasource.username=postgres
spring.datasource.password=Admin@DBA*2026
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.platform=postgres

# Dialeto PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL95Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=true

server.servlet.context-path=/loja_virtual

## Upload
spring.servlet.multipart.max-file-size=10000KB
spring.servlet.multipart.max-request-size=10000KB
spring.servlet.multipart.enabled=true

## Compress„o
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024
server.http2.enabled=true

## UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

## HikariCP - DEV (leve, seguro, sem travar o PostgreSQL)
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.pool-name=PoolHikari
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.auto-commit=true

## Batch Processing
spring.jpa.properties.hibernate.jdbc.batch_size=4
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.transaction.rollback-on-commit-failure=true

## Tomcat - DEV (valores realistas)
server.tomcat.max-connections=200
server.tomcat.threads.min-spare=10
server.servlet.session.timeout=240m

## Limpeza de sess„o
spring.session.jdbc.cleanup-cron=0 0 4 * * *

## Recursos est·ticos
spring.mvc.static-path-pattern=/resources/static/**

## Flyway
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/sql/versionamento
spring.flyway.fail-on-missing-locations=true
spring.flyway.baseline-version=1
spring.flyway.sql-migration-prefix=V
spring.flyway.sql-migration-separator=__
spring.flyway.sql-migration-suffixes=.sql